<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h1>Login</h1>

<form method="POST">

    <input
        type="email"
        name="email"
        placeholder="Enter email"
        required
    >

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Enter password"
        required
    >

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

<br>

<a href="/register">
    Register here
</a>

</body>
</html>
