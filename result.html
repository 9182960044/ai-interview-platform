<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interview Results</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 600px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            animation: fadeIn 1s ease-in-out;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .score {
            text-align: center;
            font-size: 24px;
            margin-bottom: 25px;
            color: #00e6e6;
            font-weight: 600;
        }

        .card {
            background: rgba(255,255,255,0.08);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            animation: slideUp 0.6s ease;
        }

        .card h3 {
            margin: 0 0 10px;
        }

        .good {
            color: #00ffae;
        }

        .bad {
            color: #ff6b6b;
        }

        .btn {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #00c6ff;
            color: black;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0072ff;
            color: white;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Interview Results</h1>

    <div class="score">
        Total Score: {{ score }}
    </div>

    {% for item in feedback %}
        <div class="card">
            <h3>{{ item.question }}</h3>
            <p><strong>Score:</strong> {{ item.score }}</p>

            {% if item.score > 0 %}
                <p class="good">✔ {{ item.suggestion }}</p>
            {% else %}
                <p class="bad">✘ {{ item.suggestion }}</p>
            {% endif %}
        </div>
    {% endfor %}

    <a href="/">
        <button class="btn">Try Again</button>
    </a>
</div>

</body>
</html>
